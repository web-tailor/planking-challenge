<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;700&display=swap');

.card {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  font-family: 'DM Mono', monospace;
}

/* Grid lines */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* Left accent bar */
.bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 8px;
  background: linear-gradient(180deg, #ff6b35, #ff9b35);
}

/* Big decorative plank figure */
.figure {
  position: absolute;
  right: 60px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.08;
}

/* Content */
.content {
  position: absolute;
  left: 80px;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
}

.eyebrow {
  display: inline-block;
  background: rgba(255, 107, 53, 0.15);
  color: #ff6b35;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 20px;
  margin-bottom: 24px;
  width: fit-content;
}

.headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 110px;
  line-height: 0.9;
  letter-spacing: -2px;
  color: #ffffff;
  margin-bottom: 4px;
}

.headline span {
  background: linear-gradient(90deg, #ff6b35, #ff9b35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  color: #5a6a7a;
  letter-spacing: 0.5px;
  margin-top: 20px;
  margin-bottom: 32px;
}

.accent-line {
  width: 120px;
  height: 4px;
  background: linear-gradient(90deg, #ff6b35, #ff9b35);
  border-radius: 2px;
  margin-bottom: 20px;
}

.domain {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  color: #3a4a5a;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="bar"></div>

  <!-- Big decorative figure SVG -->
  <svg class="figure" width="500" height="400" viewBox="0 0 200 160">
    <circle cx="160" cy="40" r="22" fill="#ff6b35"/>
    <rect x="40" y="68" width="110" height="24" rx="12" fill="#ff6b35"/>
    <rect x="30" y="72" width="24" height="40" rx="12" fill="#ff6b35" transform="rotate(-10 42 92)"/>
    <rect x="10" y="68" width="35" height="20" rx="10" fill="#ff6b35"/>
    <rect x="0" y="100" width="200" height="8" rx="4" fill="#ff6b35"/>
  </svg>

  <div class="content">
    <div class="eyebrow">30-Day Challenge</div>
    <div class="headline">BREAK YOUR<br><span>OWN RECORD</span></div>
    <div class="subtitle">Track progress · Compete with friends · Set new PRs</div>
    <div class="accent-line"></div>
  </div>
</div>
</body>
</html>
