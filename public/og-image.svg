<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff9b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Orange accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>

  <!-- Large plank figure (right side decoration) -->
  <g opacity="0.12" transform="translate(750, 200) scale(3)">
    <circle cx="52" cy="26" r="5" fill="#ff6b35"/>
    <rect x="18" y="29" width="32" height="6" rx="3" fill="#ff6b35"/>
    <rect x="16" y="30" width="6" height="10" rx="3" fill="#ff6b35" transform="rotate(-10 19 35)"/>
    <rect x="10" y="29" width="10" height="5" rx="2.5" fill="#ff6b35"/>
    <rect x="6" y="40" width="52" height="2" rx="1" fill="#ff6b35"/>
  </g>

  <!-- Main content -->
  <!-- Eyebrow label -->
  <rect x="80" y="160" width="220" height="36" rx="18" fill="#ff6b35" opacity="0.15"/>
  <text x="190" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ff6b35" text-anchor="middle" letter-spacing="3">30-DAY CHALLENGE</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-2">BREAK YOUR</text>
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="url(#accent)" letter-spacing="-2">OWN RECORD</text>

  <!-- Subtitle -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#8899aa" letter-spacing="1">Track your planking progress · Compete with friends · Set new PRs</text>

  <!-- Bottom accent line -->
  <rect x="80" y="510" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Small plank icons row -->
  <g fill="#ff6b35" opacity="0.6">
    <circle cx="80" cy="555" r="8"/>
    <circle cx="110" cy="555" r="8"/>
    <circle cx="140" cy="555" r="8"/>
  </g>
  <text x="165" y="561" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#4a5a6a">planking-challenge.app</text>
</svg>
