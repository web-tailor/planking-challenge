<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f0f1a"/>
  <!-- Plank figure body (horizontal plank position) -->
  <!-- Head -->
  <circle cx="52" cy="26" r="5" fill="#ff6b35"/>
  <!-- Body / torso (plank position - horizontal) -->
  <rect x="18" y="29" width="32" height="6" rx="3" fill="#ff6b35"/>
  <!-- Arms -->
  <rect x="16" y="30" width="6" height="10" rx="3" fill="#ff6b35" transform="rotate(-10 19 35)"/>
  <!-- Legs -->
  <rect x="10" y="29" width="10" height="5" rx="2.5" fill="#ff6b35"/>
  <!-- Ground line -->
  <rect x="6" y="40" width="52" height="2" rx="1" fill="#2a3a50"/>
</svg>
